          document.querySelector('meta[name="twitter:title"]')?.setAttribute('content', 'Open AG — Your Insurance Agency, Powered by AI');
          document.querySelector('meta[name="twitter:description"]')?.setAttribute('content', 'An AI agent with your own WhatsApp number. Responds, collects, coaches — 24/7. Request your demo.');
